<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Latihan 2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

/* Tombol Sidebar */
.sidebar-toggle{
    position:fixed;
    bottom:30px;
    right:30px;
    z-index:1000;
}

.btn-sidebar{
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:50px;
    padding:12px 24px;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
    transition:0.3s;
    display:flex;
    align-items:center;
    gap:8px;
}

.btn-sidebar:hover{
    background:#0b5ed7;
    transform:scale(1.05);
}

/* Sidebar */
.sidebar{
    position:fixed;
    top:0;
    right:-350px;
    width:350px;
    height:100vh;
    background:white;
    box-shadow:-2px 0 10px rgba(0,0,0,.1);
    z-index:1001;
    transition:right 0.3s ease;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
}

.sidebar.open{
    right:0;
}

.sidebar-header{
    padding:20px;
    background:#0d6efd;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
}

.sidebar-header h3{
    margin:0;
}

.close-sidebar{
    background:none;
    border:none;
    color:white;
    font-size:28px;
    cursor:pointer;
    padding:0;
    width:30px;
    height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.close-sidebar:hover{
    background:rgba(255,255,255,.2);
    border-radius:50%;
}

.sidebar-content{
    padding:20px;
}

.soal-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:12px;
    margin-bottom:20px;
}

.grid-soal{
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
    transition:0.2s;
    border:2px solid #ddd;
}

.grid-soal:hover{
    transform:scale(1.05);
}

.grid-soal.answered{
    background:#198754;
    color:white;
    border-color:#198754;
}

.grid-soal.unanswered{
    background:#dc3545;
    color:white;
    border-color:#dc3545;
}

.grid-soal.active{
    background:#0d6efd;
    color:white;
    border-color:#0d6efd;
    box-shadow:0 0 0 3px rgba(13,110,253,0.3);
}

.sidebar-info{
    margin-top:20px;
    padding-top:20px;
    border-top:1px solid #ddd;
}

.sidebar-info p{
    margin:8px 0;
    font-size:14px;
}

.legend{
    display:flex;
    gap:15px;
    margin-top:15px;
    flex-wrap:wrap;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
}

.legend-color{
    width:20px;
    height:20px;
    border-radius:5px;
}

/* Overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    z-index:1000;
    display:none;
}

.overlay.show{
    display:block;
}

/* Style Utama Kuis */
.header-title{
    text-align:center;
    margin-bottom:20px;
    padding-bottom:10px;
    border-bottom:2px solid #0d6efd;
}

.header-title h2{
    color:#0d6efd;
}

.info{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    font-weight:bold;
}

/* Timer normal (hitam) */
#timer{
    transition: color 0.3s ease;
    font-weight: bold;
    font-size: 18px;
}

/* Timer warna oranye (sisa 5 menit) */
.timer-warning{
    color: #fd7e14 !important;
}

/* Timer warna merah (sisa 2 menit) */
.timer-danger{
    color: #dc3545 !important;
    animation: blink 1s ease infinite;
}

/* Efek blink untuk timer merah */
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}

.question{
    font-size:20px;
    margin-bottom:15px;
    font-weight:bold;
    text-align:center;
}

.question-image{
    text-align:center;
    margin-bottom:20px;
}

.question-image img{
    max-width:100%;
    max-height:200px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.option{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.option:hover{
    background:#f2f2f2;
}

.option input{
    display:none;
}

.choice-letter{
    width:40px;
    height:40px;
    min-width:40px;
    border-radius:50%;
    background:#0d6efd;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:18px;
}

.choice-image{
    width:60px;
    height:60px;
    min-width:60px;
    border-radius:8px;
    object-fit:cover;
    background:#f0f0f0;
}

.choice-text{
    flex:1;
}

.option input:checked + .choice-letter{
    background:#198754;
}
    
.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    opacity:0.85;
}

.prev{
    background:#6c757d;
    color:white;
}

.next{
    background:#0d6efd;
    color:white;
}

.finish{
    background:#198754;
    color:white;
}

.back-home{
    background:#fd7e14;
    color:white;
}

.result{
    display:none;
    text-align:center;
}

.result h1{
    margin-bottom:20px;
    color:#0d6efd;
}

.result p{
    margin:10px 0;
    font-size:18px;
}

.result-buttons{
    display:flex;
    gap:15px;
    justify-content:center;
    margin-top:25px;
    flex-wrap:wrap;
}

/* Responsive */
@media (max-width: 768px){
    .sidebar{
        width:100%;
        right:-100%;
    }
    
    .soal-grid{
        grid-template-columns:repeat(5,1fr);
    }
    
    .btn-sidebar{
        padding:10px 18px;
        font-size:14px;
    }
    
    .choice-image{
        width:45px;
        height:45px;
    }
}

.acak-info{
    background:#e9ecef;
    padding:8px 12px;
    border-radius:8px;
    font-size:12px;
    color:#495057;
    text-align:center;
    margin-bottom:15px;
    display:none;
}
</style>

<body>

<div class="container">

<div class="header-title">
    <h2>🖼️ Latihan 2</h2>
</div>

<div id="quiz">
    <div class="info">
        <span id="progress">Soal 1/10</span>
        <span id="timer">10:00</span>
    </div>

    <div class="question" id="question"></div>
    <div id="questionImage" class="question-image"></div>
    <div id="options"></div>

    <div class="buttons">
        <button class="prev" onclick="prevQuestion()">◀ Previous</button>
        <button id="nextFinishBtn" class="next" onclick="nextQuestion()">Next ▶</button>
    </div>
</div>

<div class="result" id="result">
    <h1>📊 Hasil Kuis</h1>
    <p>📝 Latihan 2</p>
    <p>✅ Jawaban Benar: <span id="correct"></span></p>
    <p>❌ Jawaban Salah: <span id="wrong"></span></p>
    <p>⭐ Nilai: <span id="score"></span></p>
    <br />
    <div class="result-buttons">
        <button class="finish" onclick="restartQuiz()">
            🔄 Ulangi Kuis
        </button>
        <button class="back-home" onclick="goToHomePage()">
            🏠 Kembali ke Menu Utama
        </button>
    </div>
</div>

</div>

<!-- Tombol Sidebar -->
<div class="sidebar-toggle" id="sidebarToggle">
    <button class="btn-sidebar" onclick="toggleSidebar()">
        📋 Daftar Soal
    </button>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>📋 Daftar Soal</h3>
        <button class="close-sidebar" onclick="toggleSidebar()">&times;</button>
    </div>
    <div class="sidebar-content">

                </div>

                    <div class="legend-color" style="background:#198754;"></div>
                    <span>Sudah Dijawab</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background:#dc3545;"></div>
                    <span>Belum Dijawab</span>
                </div>
            </div>
            <p style="margin-top:15px; font-size:12px; color:#666;">
                💡 Klik nomor soal untuk langsung ke soal tersebut
            </p>
        </div>
    </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

// ========== FUNGSI UPDATE WARNA TIMER ==========
function updateTimerColor(remainingTime) {
    const timerElement = document.getElementById("timer");
    
    // Hapus kelas yang ada
    timerElement.classList.remove("timer-warning", "timer-danger");
    
    // Cek sisa waktu
    if(remainingTime <= 120) { // 2 menit (120 detik)
        timerElement.classList.add("timer-danger");
    } else if(remainingTime <= 300) { // 5 menit (300 detik)
        timerElement.classList.add("timer-warning");
    }
    // Selain itu warna default (hitam)
}

// ========== FUNGSI MENGACAK PILIHAN ==========
function shuffleOptions(questionData) {
    const optionPairs = questionData.options.map((opt, idx) => ({
        text: opt.text,
        image: opt.image,
        originalIndex: idx
    }));
    
    for(let i = optionPairs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [optionPairs[i], optionPairs[j]] = [optionPairs[j], optionPairs[i]];
    }
    
    const shuffledOptions = optionPairs.map(pair => ({
        text: pair.text,
        image: pair.image
    }));
    
    const newAnswerIndex = optionPairs.findIndex(pair => pair.originalIndex === questionData.answer);
    
    return {
        question: questionData.question,
        questionImage: questionData.questionImage,
        options: shuffledOptions,
        answer: newAnswerIndex
    };
}

function shuffleAllQuestions() {
    questions = originalQuestions.map(q => shuffleOptions(q));
}

// ========== INISIALISASI ==========
function initQuiz() {
    shuffleAllQuestions();
    
    currentQuestion = 0;
    userAnswers = Array(questions.length).fill(null);
    
    loadQuestion();
    updateSoalGrid();
    startTimer();
}

function restartQuiz() {
    if(timerInterval) clearInterval(timerInterval);
    shuffleAllQuestions();
    
    currentQuestion = 0;
    userAnswers = Array(questions.length).fill(null);
    
    document.getElementById("result").style.display = "none";
    document.getElementById("quiz").style.display = "block";
    document.getElementById("sidebarToggle").style.display = "block";
    
    loadQuestion();
    updateSoalGrid();
    startTimer();
}

// ========== FUNGSI SIDEBAR ==========
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
}

function updateSoalGrid() {
    const grid = document.getElementById('soalGrid');
    if(!grid) return;
    
    let html = '';
    for(let i = 0; i < questions.length; i++) {
        let statusClass = 'unanswered';
        if(userAnswers[i] !== null) statusClass = 'answered';
        if(i === currentQuestion) statusClass = 'active';
        
        html += `<div class="grid-soal ${statusClass}" onclick="goToSoal(${i})">${i + 1}</div>`;
    }
    grid.innerHTML = html;
}

function goToSoal(soalIndex) {
    saveAnswer();
    currentQuestion = soalIndex;
    loadQuestion();
    toggleSidebar();
}

function loadQuestion() {
    document.getElementById("progress").innerText = `Soal ${currentQuestion+1}/${questions.length}`;
    document.getElementById("question").innerText = questions[currentQuestion].question;
    
    const questionImageDiv = document.getElementById("questionImage");
    const qImage = questions[currentQuestion].questionImage;
    if(qImage && qImage !== null){
        questionImageDiv.innerHTML = `<img src="${qImage}" alt="Gambar soal">`;
        questionImageDiv.style.display = "block";
    } else {
        questionImageDiv.innerHTML = "";
        questionImageDiv.style.display = "none";
    }
    
    let html = "";
    const currentOptions = questions[currentQuestion].options;
    
    currentOptions.forEach((opt, index) => {
        let isChecked = (userAnswers[currentQuestion] === index) ? "checked" : "";
        
        const hasImage = opt.image && opt.image !== null;
        const imageHtml = hasImage ? `<img class="choice-image" src="${opt.image}" alt="${opt.text}">` : "";
        
        html += `
        <label class="option">
            <input type="radio" name="answer" value="${index}" ${isChecked}>
            <span class="choice-letter">${prefixes[index]}</span>
            ${imageHtml}
            <span class="choice-text">${opt.text}</span>
        </label>
        `;
    });
    
    document.getElementById("options").innerHTML = html;
    updateSoalGrid();
    updateButtonText();
}

function updateButtonText() {
    const btn = document.getElementById("nextFinishBtn");
    if(currentQuestion === questions.length-1) {
        btn.innerText = "✅ Selesai";
        btn.className = "finish";
        btn.onclick = () => finishQuiz();
    } else {
        btn.innerText = "Next ▶";
        btn.className = "next";
        btn.onclick = () => nextQuestion();
    }
}

function saveAnswer() {
    const selected = document.querySelector('input[name="answer"]:checked');
    if(selected) {
        userAnswers[currentQuestion] = parseInt(selected.value);
        updateSoalGrid();
    }
}

function nextQuestion() {
    saveAnswer();
    if(currentQuestion < questions.length-1) {
        currentQuestion++;
        loadQuestion();
    }
}

function prevQuestion() {
    saveAnswer();
    if(currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
    }
}

function finishQuiz() {
    if(timerInterval) clearInterval(timerInterval);
    saveAnswer();

    let correct = 0;
    questions.forEach((q, index) => {
        if(userAnswers[index] === q.answer) correct++;
    });

    let wrong = questions.length - correct;
    let score = Math.round((correct/questions.length)*100);

    document.getElementById("quiz").style.display = "none";
    document.getElementById("result").style.display = "block";
    document.getElementById("correct").innerText = correct;
    document.getElementById("wrong").innerText = wrong;
    document.getElementById("score").innerText = score;
    
    document.getElementById("sidebarToggle").style.display = "none";
}

function startTimer() {
    if(timerInterval) clearInterval(timerInterval);
    time = 600;
    timerInterval = setInterval(() => {
        let minutes = Math.floor(time/60);
        let seconds = time%60;
        
        // Update tampilan timer
        document.getElementById("timer").innerText = `${String(minutes).padStart(2,"0")}:${String(seconds).padStart(2,"0")}`;
        
        // Update warna timer berdasarkan sisa waktu
        updateTimerColor(time);
        
        if(time <= 0) {
            clearInterval(timerInterval);
            finishQuiz();
        }
        time--;
    }, 1000);
}

// Jalankan quiz saat halaman dimuat
initQuiz();

</script>
